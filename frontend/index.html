    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Not black-translucent: WebKit sizes the standalone webview 59pt short
         while still drawing under the status bar, leaving a dead bar at the
         bottom. With "black" the webview sits below the status bar and its
         reported height is honest. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <meta name="theme-color" content="#171412" />
