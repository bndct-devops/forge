# Publishes the Docker image to ghcr. Manual only for now — run it from the
# Actions tab (or `gh workflow run release.yml`) when you want a release.
name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Additional image tag (e.g. v0.1.0). "latest" is always pushed.
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ${{ inputs.tag && format('ghcr.io/{0}:{1}', github.repository, inputs.tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
