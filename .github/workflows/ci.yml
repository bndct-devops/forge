name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Boot check
        run: |
          FORGE_DATA_DIR=/tmp/forge-ci python -m uvicorn backend.main:app --port 8081 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8081/api/health && exit 0
            sleep 1
          done
          echo "backend failed to boot" && exit 1
